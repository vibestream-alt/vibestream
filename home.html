<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibestream - Live Streaming Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            font-size: 16px;
            color: #666;
            font-weight: 300;
        }

        .streams-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .streams-section h2 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .stream-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .stream-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .stream-thumbnail {
            width: 100%;
            height: 160px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .stream-info {
            padding: 20px;
            color: white;
        }

        .stream-info h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .stream-info p {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .stream-viewers {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            color: #666;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
            color: #999;
            line-height: 1.6;
        }

        .live-badge {
            display: inline-block;
            background: #ff4444;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(255, 68, 68, 0);
            }
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 32px;
            }

            .streams-section {
                padding: 20px;
            }

            .streams-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 VIBESTREAM</h1>
            <p>Din live streaming plattform - Starta eller titta på livestreams från äkta creators</p>
        </header>

        <div class="streams-section">
            <h2>📡 Aktiva livestreams</h2>
            <div class="streams-grid" id="streamsContainer">
                <!-- Livestreams kommer att visas här -->
            </div>
        </div>

        <footer>
            <p>© 2026 Vibestream. Alla rättigheter förbehållna.</p>
        </footer>
    </div>

    <!-- Vercel Speed Insights -->
    <script type="module" src="./speed-insights.js"></script>

    <script>
        // Denna array skulle normalt hämtas från en backend-databas
        const liveStreams = [
            // Exempel på en livestream (ta bort detta för att visa "Ingen streaming"-meddelandet)
            // {
            //     id: 1,
            //     streamerName: "CoolStreamer",
            //     title: "Gaming Night!",
            //     category: "Gaming",
            //     viewers: 1234
            // }
        ];

        function renderStreams() {
            const container = document.getElementById('streamsContainer');
            
            if (liveStreams.length === 0) {
                // Visa tomt tillstånd när ingen streamar
                container.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">📺</div>
                            <h3>Ingen livestream just nu</h3>
                            <p>Det finns ingen som streamar för tillfället.<br>
                            Kom tillbaka senare eller bli den första som startar en livestream!</p>
                        </div>
                    </div>
                `;
                return;
            }

            // Visa alla aktiva livestreams
            container.innerHTML = liveStreams.map(stream => `
                <div class="stream-card">
                    <div class="stream-thumbnail">
                        [Stream Thumbnail]
                    </div>
                    <div class="stream-info">
                        <div class="live-badge">🔴 LIVE</div>
                        <h3>${stream.streamerName}</h3>
                        <p>${stream.title}</p>
                        <p><strong>${stream.category}</strong></p>
                        <div class="stream-viewers">👥 ${stream.viewers.toLocaleString('sv-SE')} tittare</div>
                    </div>
                </div>
            `).join('');
        }

        // Rendera streams när sidan laddar
        document.addEventListener('DOMContentLoaded', renderStreams);

        // Uppdatera streams var 5:e sekund (för realtidseffekt)
        setInterval(renderStreams, 5000);
    </script>
</body>
</html>
