<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:site_name" content="Vibestream">
    <title>Vibestream - Live Streaming Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            font-size: 16px;
            color: #666;
            font-weight: 300;
        }

        .user-actions {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .login-button,
        .logout-button {
            background: #5a67d8;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-button:hover,
        .logout-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .user-welcome {
            color: #4a5568;
            font-size: 15px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            width: min(500px, 100%);
            background: white;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .close-button {
            position: absolute;
            top: 18px;
            right: 18px;
            border: none;
            background: transparent;
            font-size: 20px;
            cursor: pointer;
            color: #4a5568;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid #e2e8f0;
            background: #f7fafc;
            color: #2d3748;
            cursor: pointer;
            font-weight: 600;
        }

        .auth-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .auth-form {
            display: none;
            gap: 16px;
        }

        .auth-form.active {
            display: grid;
        }

        .auth-form label {
            font-size: 14px;
            color: #4a5568;
        }

        .auth-form input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 12px;
            font-size: 14px;
        }

        .submit-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 18px;
            border-radius: 999px;
            font-size: 15px;
            cursor: pointer;
        }

        .form-message {
            margin-top: 10px;
            color: #e53e3e;
            font-size: 14px;
            min-height: 18px;
        }

        .success-message {
            color: #2f855a;
        }

        .streams-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .streams-section h2 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .stream-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .stream-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .stream-thumbnail {
            width: 100%;
            height: 160px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .stream-info {
            padding: 20px;
            color: white;
        }

        .stream-info h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .stream-info p {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .stream-viewers {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            color: #666;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
            color: #999;
            line-height: 1.6;
        }

        .live-badge {
            display: inline-block;
            background: #ff4444;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(255, 68, 68, 0);
            }
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 32px;
            }

            .streams-section {
                padding: 20px;
            }

            .streams-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 VIBESTREAM</h1>
            <p>Din live streaming plattform - Starta eller titta på livestreams från äkta creators</p>
        </header>
        <div class="user-actions">
            <button class="login-button" id="loginButton">Logga in</button>
            <span class="user-welcome" id="userWelcome"></span>
        </div>

        <div class="streams-section">
            <h2>📡 Aktiva livestreams</h2>
            <div class="streams-grid" id="streamsContainer">
                <!-- Livestreams kommer att visas här -->
            </div>
        </div>

        <footer>
            <p>© 2026 Vibestream. Alla rättigheter förbehållna.</p>
        </footer>
    </div>

    <script>
        const liveStreams = [];

        function renderStreams() {
            const container = document.getElementById('streamsContainer');
            
            if (liveStreams.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">📺</div>
                            <h3>Ingen livestream just nu</h3>
                            <p>Det finns ingen som streamar för tillfället.<br>
                            Kom tillbaka senare eller bli den första som startar en livestream!</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = liveStreams.map(stream => `
                <div class="stream-card">
                    <div class="stream-thumbnail">
                        [Stream Thumbnail]
                    </div>
                    <div class="stream-info">
                        <div class="live-badge">🔴 LIVE</div>
                        <h3>${stream.streamerName}</h3>
                        <p>${stream.title}</p>
                        <p><strong>${stream.category}</strong></p>
                        <div class="stream-viewers">👥 ${stream.viewers.toLocaleString('sv-SE')} tittare</div>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderStreams);
        setInterval(renderStreams, 5000);
    </script>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="close-button" id="closeLoginModal">✕</button>
            <div class="auth-tabs">
                <button class="auth-tab active" id="signinTab">Logga in</button>
                <button class="auth-tab" id="signupTab">Skapa konto</button>
            </div>
            <form id="signinForm" class="auth-form active">
                <label for="signinUsername">Användarnamn</label>
                <input id="signinUsername" type="text" placeholder="Ditt användarnamn" required>
                <label for="signinPassword">Lösenord</label>
                <input id="signinPassword" type="password" placeholder="Ditt lösenord" required>
                <button type="submit" class="submit-button">Logga in</button>
                <p class="form-message" id="signinMessage"></p>
            </form>
            <form id="signupForm" class="auth-form">
                <label for="signupUsername">Användarnamn</label>
                <input id="signupUsername" type="text" placeholder="Välj ett användarnamn" required>
                <label for="signupPassword">Lösenord</label>
                <input id="signupPassword" type="password" placeholder="Välj ett lösenord" required>
                <button type="submit" class="submit-button">Skapa konto</button>
                <p class="form-message" id="signupMessage"></p>
            </form>
        </div>
    </div>

    <script src="logga-in.js"></script>
</body>
</html>
